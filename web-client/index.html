<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Radio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="content">
    <h1>📻 WEB RADIO</h1>
    <div id="now-playing">
        <div id="now-playing-main">
            <span id="status">—</span>
            <span id="modulation-badge"></span>
        </div>
        <div id="rds-info">
            <span id="rds-ps"></span>
        </div>
    </div>
    <div id="modulation-selector">
        <button id="btn-fm" class="mod-btn active" onclick="selectModulation('fm')">FM</button>
        <button id="btn-am" class="mod-btn" onclick="selectModulation('am')">AM</button>
    </div>
    <div id="waterfall-wrap">
        <div id="waterfall-container">
            <canvas id="waterfall"></canvas>
            <canvas id="waterfall-overlay"></canvas>
        </div>
        <canvas id="freq-scale"></canvas>
        <div id="hover-freq"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/msgpack-lite/0.1.26/msgpack.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
